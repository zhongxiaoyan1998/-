<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能点名积分系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent-purple: #8957e5;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-red: #da3633;
            --gradient-purple: linear-gradient(135deg, #8957e5 0%, #6f42c1 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 登录界面 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header .logo {
            width: 80px;
            height: 80px;
            background: var(--gradient-purple);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(137, 87, 229, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(137, 87, 229, 0); }
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .form-floating input {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 12px;
        }

        .form-floating input:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-purple);
            color: var(--text-primary);
            box-shadow: 0 0 0 4px rgba(137, 87, 229, 0.15);
        }

        .form-floating label {
            color: var(--text-secondary);
        }

        .btn-login {
            background: var(--gradient-purple);
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-weight: 600;
            font-size: 16px;
            color: white;
            transition: all 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(137, 87, 229, 0.4);
        }

        /* 班级选择界面 */
        .class-container {
            display: none;
            padding: 20px;
            min-height: 100vh;
        }

        .navbar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--bg-secondary);
            padding: 8px 20px;
            margin-bottom: 10px;
            border-radius: 0 0 12px 12px;
        }

        .navbar-brand {
            font-size: 20px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .class-card {
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 16px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(137, 87, 229, 0.3);
            border-color: var(--accent-purple);
        }

        .class-card .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--accent-red);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .class-card:hover .delete-btn {
            display: flex;
        }

        .class-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-purple);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            font-size: 30px;
            color: white;
        }

        .class-name {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .class-info {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .add-class-card {
            border: 2px dashed var(--bg-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            background: transparent;
        }

        .add-class-card:hover {
            border-color: var(--accent-purple);
            background: rgba(137, 87, 229, 0.05);
        }

        .add-class-card .add-icon {
            font-size: 50px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .add-class-card:hover .add-icon {
            color: var(--accent-purple);
        }

        /* 主界面 */
        .main-container {
            display: none;
            padding: 10px;
            min-height: 100vh;
        }

        .main-content {
            display: flex;
            gap: 12px;
            height: calc(100vh - 20px);
        }

        /* 班级信息头部 */
        .class-info-header {
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 10px;
        }

        .class-name-info {
            font-size: 20px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sync-indicator-sm {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            font-size: 11px;
        }

        .back-btn-sm {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }

        .back-btn-sm:hover {
            color: var(--text-primary);
        }

        /* 点名区域顶部控制栏 */
        .roll-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bg-secondary);
        }

        .roll-class-name {
            font-size: 18px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .roll-controls {
            display: flex;
            gap: 8px;
        }

        .btn-control {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-card);
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-control:hover {
            background: var(--accent-purple);
            color: white;
            transform: scale(1.1);
        }

        /* 点名主内容区 */
        .roll-main-content {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .roll-center {
            flex: 0 0 auto;
        }

        .roll-name-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn-roll-main {
            width: 120px;
            height: 120px;
            border-radius: 16px;
            background: var(--gradient-purple);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(137, 87, 229, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-roll-main:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(137, 87, 229, 0.6);
        }

        .student-name-vertical {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
            min-height: 38px;
            color: var(--text-primary);
            text-align: center;
            line-height: 1.3;
        }

        /* 语音控制区 */
        .voice-control-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
        }

        .voice-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 左侧区域 40% */
        .left-panel {
            flex: 0 0 40%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 300px;
            max-width: 60%;
            position: relative;
        }

        /* 右侧区域 60% */
        .right-panel {
            flex: 0 0 60%;
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
            max-width: 70%;
        }

        /* 拖拽调整宽度 */
        .resize-handle {
            width: 6px;
            background: var(--bg-secondary);
            cursor: col-resize;
            transition: background 0.3s;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .resize-handle:hover,
        .resize-handle.active {
            background: var(--accent-purple);
        }

        .resize-handle::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 40px;
            background: var(--text-secondary);
            border-radius: 1px;
        }

        /* 点名区域 */
        .roll-call-panel {
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            flex: 0 0 auto;
        }

        .roll-content {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .roll-left {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
        }

        .roll-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn-roll-large {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: var(--gradient-purple);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(137, 87, 229, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-roll-large:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(137, 87, 229, 0.6);
        }

        .student-display-small {
            width: 60px;
            height: 60px;
            background: var(--gradient-purple);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 15px 40px rgba(137, 87, 229, 0.3);
            transition: all 0.3s;
            margin: 0 auto 8px;
        }

        .student-display-small.rolling {
            animation: rolling 0.1s infinite;
        }

        @keyframes rolling {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
        }

        .student-name-large {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 6px;
            min-height: 26px;
            color: var(--text-primary);
        }

        .student-group-info {
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-size: 12px;
        }

        /* 语音控制按钮 */
        .voice-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--gradient-purple);
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(137, 87, 229, 0.4);
            margin: 0 auto;
        }

        .voice-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(137, 87, 229, 0.6);
        }

        .voice-btn.listening {
            animation: pulse-voice 1s ease-in-out infinite;
            background: var(--accent-red);
        }

        @keyframes pulse-voice {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(218, 54, 51, 0.4); }
            50% { transform: scale(1.1); box-shadow: 0 0 0 20px rgba(218, 54, 51, 0); }
        }

        .voice-tip {
            color: var(--text-secondary);
            font-size: 10px;
            margin-top: 5px;
            text-align: center;
        }

        /* 左侧下方排行榜区域 */
        .ranking-panel {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            gap: 15px;
            overflow: hidden;
        }

        .ranking-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .ranking-section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--bg-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ranking-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            padding: 16px 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .ranking-item:hover {
            background: var(--bg-card);
            transform: translateX(3px);
        }

        .ranking-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .ranking-item:nth-child(1) .ranking-number {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
        }

        .ranking-item:nth-child(2) .ranking-number {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #000;
        }

        .ranking-item:nth-child(3) .ranking-number {
            background: linear-gradient(135deg, #cd7f32 0%, #e8a962 100%);
            color: #fff;
        }

        .ranking-name {
            flex: 1;
            font-weight: 600;
            font-size: 20px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ranking-score {
            font-weight: bold;
            font-size: 28px;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }



        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            flex: 1;
            overflow-y: auto;
            align-content: start;
        }

        .group-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--bg-card);
        }

        .group-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .group-total {
            font-size: 22px;
            font-weight: 700;
            background: var(--gradient-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .group-members {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .group-member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: var(--bg-card);
            border-radius: 6px;
            transition: all 0.3s;
            min-height: 40px;
        }

        .group-member-item:hover {
            background: rgba(137, 87, 229, 0.1);
        }

        .group-member-item.selected {
            background: rgba(137, 87, 229, 0.2);
            border: 1px solid var(--accent-purple);
        }

        .member-name {
            font-size: 18px;
            font-weight: 600;
        }

        .member-score {
            font-size: 16px;
            color: var(--accent-purple);
            font-weight: 600;
            margin-right: 10px;
        }

        .member-actions {
            display: flex;
            gap: 5px;
        }

        .btn-member-score {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-member-score.add {
            background: var(--accent-green);
            color: white;
        }

        .btn-member-score.add:hover {
            background: #1e7e34;
            transform: scale(1.1);
        }

        .btn-member-score.subtract {
            background: var(--accent-red);
            color: white;
        }

        .btn-member-score.subtract:hover {
            background: #b52b2b;
            transform: scale(1.1);
        }

        /* 模态框 */
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--bg-secondary);
            border-radius: 20px;
            color: var(--text-primary);
        }

        .modal-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--bg-secondary);
            border-radius: 20px 20px 0 0;
            padding: 20px;
        }

        .modal-header .btn-close {
            filter: invert(1);
        }

        .modal-body {
            padding: 20px;
        }

        .form-control, .form-select {
            background: var(--bg-secondary);
            border: 1px solid var(--bg-secondary);
            color: var(--text-primary);
            border-radius: 10px;
        }

        .form-control:focus, .form-select:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-purple);
            color: var(--text-primary);
            box-shadow: 0 0 0 4px rgba(137, 87, 229, 0.15);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-card);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-content {
                flex-direction: column;
                height: auto;
            }

            .left-panel {
                flex: none;
                width: 100%;
            }

            .right-panel {
                flex: none;
                width: 100%;
                min-height: 600px;
            }

            .groups-container {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 15px 20px;
            }

            .class-grid {
                grid-template-columns: 1fr;
            }

            .groups-container {
                grid-template-columns: 1fr;
            }

            .ranking-panel {
                flex-direction: column;
            }
        }

        /* 同步指示器 */
        .sync-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: var(--bg-secondary);
            border-radius: 20px;
            font-size: 13px;
        }

        .sync-indicator.syncing i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            border-radius: 10px;
            padding: 8px 20px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: var(--accent-red);
            color: white;
        }

        .btn-primary {
            background: var(--gradient-purple);
            border: none;
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginPage">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="bi bi-stars"></i>
                </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        // ==================== 数据管理 ====================
        let isLoggedIn = false;
        let currentClassId = null;
        let selectedStudent = null;
        let isRolling = false;
        let isListening = false;
        let recognition = null;

        // ==================== Supabase 云数据库配置 ====================
        const SUPABASE_CONFIG = {
            url: 'https://pthmbcmjensegczmhwry.supabase.co',
            key: 'sb_publishable_awZsxjg8tLWaz3uFnqQ_Jg_fPoBpN21'
        };
        let supabaseClient = null;  // 改名避免冲突
        let isCloudEnabled = false;

        // 初始化数据
        const defaultPassword = 'teacher123';
        const defaultGroups = [
            { id: 1, code: 'A', name: '第一组', slogan: '团结就是力量', color: '#8957e5' },
            { id: 2, code: 'B', name: '第二组', slogan: '勇往直前', color: '#58a6ff' },
            { id: 3, code: 'C', name: '第三组', slogan: '永不放弃', color: '#238636' },
            { id: 4, code: 'D', name: '第四组', slogan: '努力拼搏', color: '#da3633' },
            { id: 5, code: 'E', name: '第五组', slogan: '超越自我', color: '#f0883e' },
            { id: 6, code: 'F', name: '第六组', slogan: '共创辉煌', color: '#3fb950' }
        ];
        const defaultClass = {
            id: Date.now(),
            name: '六1班',
            students: [],
            groups: [...defaultGroups]
        };

        let appData = {
            password: defaultPassword,
            classes: []
        };

        // ==================== 初始化 ====================
        async function initApp() {
            // 显示加载提示
            console.log('正在初始化系统...');
            
            await initSupabase();
            await loadAppData();  // 等待数据加载完成
            initVoiceRecognition();
            checkLoginStatus();
            
            console.log('系统初始化完成');
        }

        // ==================== Supabase 初始化 ====================
        async function initSupabase() {
            try {
                // 检查 supabase 库是否加载成功
                if (typeof supabase === 'undefined' || !supabase.createClient) {
                    console.log('Supabase 库未加载,使用本地存储模式');
                    isCloudEnabled = false;
                    return false;
                }
                
                supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
                isCloudEnabled = true;
                console.log('✓ Supabase 初始化成功');
                return true;
            } catch (error) {
                console.error('✗ Supabase 初始化失败:', error);
                isCloudEnabled = false;
                return false;
            }
        }

        async function loadAppData() {
            if (isCloudEnabled && supabaseClient) {
                try {
                    // 从云端加载数据
                    const { data: cloudData, error } = await supabaseClient
                        .from('app_data')
                        .select('data')
                        .eq('id', 'main')
                        .single();

                    if (cloudData && cloudData.data) {
                        appData = cloudData.data;
                        console.log('✓ 从云端加载数据成功');

                        // 同步到本地存储
                        localStorage.setItem('classroom_app_data', JSON.stringify(appData));
                        return;
                    } else if (!error) {
                        // 云端没有数据,使用本地数据
                        console.log('云端暂无数据,使用本地数据');
                    }
                } catch (error) {
                    console.log('✗ 云端加载失败,使用本地数据:', error.message);
                }
            }

            // 从本地加载数据
            const savedData = localStorage.getItem('classroom_app_data');
            if (savedData) {
                try {
                    appData = JSON.parse(savedData);
                    // 为没有小组信息的旧数据添加默认小组
                    appData.classes.forEach(cls => {
                        if (!cls.groups || cls.groups.length === 0) {
                            cls.groups = [...defaultGroups];
                        }
                    });
                } catch (e) {
                    console.log('本地数据损坏,使用默认数据');
                    appData.classes = [defaultClass];
                }
            } else {
                appData.classes = [defaultClass];
            }
        }

        async function saveAppData() {
            // 保存到本地
            localStorage.setItem('classroom_app_data', JSON.stringify(appData));

            // 同步到云端
            if (isCloudEnabled && supabaseClient) {
                try {
                    const { error } = await supabaseClient
                        .from('app_data')
                        .upsert({
                            id: 'main',
                            data: appData,
                            updated_at: new Date().toISOString()
                        });

                    if (error) throw error;
                    console.log('✓ 数据已同步到云端');
                } catch (error) {
                    console.error('✗ 云端同步失败:', error.message);
                }
            }

            showSyncStatus();
        }

        function getCurrentClass() {
            return appData.classes.find(c => c.id === currentClassId);
        }

        function showSyncStatus() {
            const statuses = [document.getElementById('syncStatus'), document.getElementById('mainSyncStatus')];
            statuses.forEach(status => {
                if (status) {
                    status.innerHTML = '<i class="bi bi-cloud-arrow-up syncing"></i><span>同步中...</span>';
                    setTimeout(() => {
                        status.innerHTML = '<i class="bi bi-cloud-check"></i><span>已同步</span>';
                    }, 800);
                }
            });
        }

        // ==================== 登录系统 ====================
        function checkLoginStatus() {
            const loginTime = localStorage.getItem('classroom_login_time');
            if (loginTime) {
                const timeDiff = Date.now() - parseInt(loginTime);
                if (timeDiff < 24 * 60 * 60 * 1000) {
                    showClassPage();
                    isLoggedIn = true;
                }
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            console.log('尝试登录,密码:', password);
            console.log('当前密码:', appData.password);
            
            if (password === appData.password) {
                localStorage.setItem('classroom_login_time', Date.now().toString());
                isLoggedIn = true;
                console.log('登录成功');
                showClassPage();
            } else {
                console.log('密码错误');
                alert('密码错误!');
            }
        });

        function showClassPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('classPage').style.display = 'block';
            document.getElementById('mainPage').style.display = 'none';
            renderClasses();
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('classroom_login_time');
                isLoggedIn = false;
                currentClassId = null;
                selectedStudent = null;
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('classPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'none';
                document.getElementById('password').value = '';
            }
        }

        // ==================== 班级管理 ====================
        function renderClasses() {
            const grid = document.getElementById('classGrid');
            grid.innerHTML = '';

            // 添加班级卡片
            appData.classes.forEach(classData => {
                const card = document.createElement('div');
                card.className = 'class-card';
                card.onclick = (e) => {
                    if (!e.target.closest('.delete-btn')) {
                        enterClass(classData.id);
                    }
                };
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteClass(${classData.id})">
                        <i class="bi bi-trash"></i>
                    </button>
                    <div class="class-icon">
                        <i class="bi bi-book"></i>
                    </div>
                    <div class="class-name">${classData.name}</div>
                    <div class="class-info">
                        <i class="bi bi-people"></i> ${classData.students.length} 位学生
                    </div>
                `;
                grid.appendChild(card);
            });

            // 添加新班级卡片
            const addCard = document.createElement('div');
            addCard.className = 'class-card add-class-card';
            addCard.setAttribute('data-bs-toggle', 'modal');
            addCard.setAttribute('data-bs-target', '#addClassModal');
            addCard.innerHTML = `
                <i class="bi bi-plus-circle add-icon"></i>
                <div class="class-name">添加班级</div>
            `;
            grid.appendChild(addCard);
        }

        function enterClass(classId) {
            currentClassId = classId;
            const classData = getCurrentClass();
            if (classData) {
                document.getElementById('currentClassName').textContent = classData.name;
                document.getElementById('classPage').style.display = 'none';
                document.getElementById('mainPage').style.display = 'block';
                renderMainInterface();
            }
        }

        function backToClasses() {
            currentClassId = null;
            selectedStudent = null;
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('classPage').style.display = 'block';
        }

        function toggleSettings() {
            const modal = new bootstrap.Modal(document.getElementById('manageClassModal'));
            modal.show();
        }

        document.getElementById('addClassForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('newClassName').value.trim();
            if (name) {
                const newClass = {

        function processImportFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    if (jsonData.length < 2) {
                        showImportResult('文件为空或格式错误', 'error');
                        return;
                    }

                    const headers = jsonData[0];
                    const classData = getCurrentClass();

                    // 判断是学生还是小组导入
                    if (headers.includes('姓名') && headers.includes('组别')) {
                        importStudents(jsonData.slice(1), classData);
                    } else if (headers.includes('组名') && headers.includes('组别代码')) {
                        importGroups(jsonData.slice(1));
                    } else {
                        showImportResult('无法识别的文件格式', 'error');
                    }
                } catch (error) {
                    showImportResult('文件解析失败: ' + error.message, 'error');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function importStudents(rows, classData) {
            let successCount = 0;
            let errorCount = 0;

            rows.forEach(row => {
                if (!row[0] || !row[2]) return; // 组别和姓名为必填

                const groupName = row[0];
                const studentNumber = row[1] || '';
                const name = row[2];
                const role = row[3] || '组员';
                const remarks = row[4] || '';

                // 映射组名到组ID
                const groupMap = {
                    '第一组': 1, '1': 1, 'A': 1,
                    '第二组': 2, '2': 2, 'B': 2,
                    '第三组': 3, '3': 3, 'C': 3,
                    '第四组': 4, '4': 4, 'D': 4,
                    '第五组': 5, '5': 5, 'E': 5,
                    '第六组': 6, '6': 6, 'F': 6
                };

                const groupId = groupMap[groupName] || parseInt(groupName);
                if (!groupId || groupId < 1 || groupId > 6) {
                    errorCount++;
                    return;
                }

                const newStudent = {
                    id: Date.now() + Math.random(),
                    name: name.trim(),
                    group: groupId,
                    score: 0,
                    studentNumber: studentNumber.trim(),
                    role: role.trim(),
                    remarks: remarks.trim()
                };

                classData.students.push(newStudent);
                successCount++;
            });

            saveAppData();
            renderMainInterface();
            renderManageStudentList();
            showImportResult(`成功导入 ${successCount} 名学生${errorCount > 0 ? `，失败 ${errorCount} 条` : ''}`, 'success');
        }

        function importGroups(rows) {
            const classData = getCurrentClass();
            if (!classData) return;

            let successCount = 0;
            let errorCount = 0;

            rows.forEach(row => {
                if (!row[0] || !row[1]) return; // 组别代码和组名为必填

                const code = row[0].trim();
                const name = row[1].trim();
                const slogan = row[2] ? row[2].trim() : '';
                const color = row[3] ? row[3].trim() : getRandomColor();

                // 检查是否已存在相同组别代码的小组
                const existingIndex = classData.groups.findIndex(g => g.code === code);
                if (existingIndex >= 0) {
                    // 更新现有小组
                    classData.groups[existingIndex] = {
                        ...classData.groups[existingIndex],
                        name: name,
                        slogan: slogan,
                        color: color
                    };
                } else {
                    // 添加新小组
                    const newGroup = {
                        id: Date.now() + Math.random(),
                        code: code,
                        name: name,
                        slogan: slogan,
                        color: color
                    };
                    classData.groups.push(newGroup);
                }
                successCount++;
            });

            saveAppData();
            renderMainInterface();
            renderGroupList();
            showImportResult(`成功导入/更新 ${successCount} 个小组${errorCount > 0 ? `，失败 ${errorCount} 条` : ''}`, 'success');
        }

            renderGroupRanking();

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1;
                utterance.pitch = 1;
                speechSynthesis.speak(utterance);
            }
        }

        // ==================== 音效系统 ====================
        function playSound(type) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                if (type === 'add') {
                    oscillator.frequency.setValueAtTime(523.25, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(659.25, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                } else {
                    oscillator.frequency.setValueAtTime(392.00, audioContext.currentTime);
                    oscillator.frequency.setValueAtTime(349.23, audioContext.currentTime + 0.1);
                    gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.2);
                }

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.3);
            } catch (error) {
                console.log('音效播放失败');
            }
        }

        // ==================== 语音控制 ====================
        function initVoiceRecognition() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                recognition.lang = 'zh-CN';
                recognition.continuous = false;
                recognition.interimResults = false;

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    handleVoiceCommand(transcript);
                };

                recognition.onend = function() {
                    if (isListening) {
                        recognition.start();
                    }
                };

                recognition.onerror = function(event) {
                    console.error('语音识别错误:', event.error);
                    if (event.error === 'not-allowed') {
                        alert('请允许麦克风权限');
                        stopVoiceControl();
                    }
                };
            }
        }

        function toggleVoiceControl() {
            if (!recognition) {
                alert('您的浏览器不支持语音识别');
                return;
            }

            isListening = !isListening;
            const voiceBtn = document.getElementById('voiceBtn');

            if (isListening) {
                voiceBtn.classList.add('listening');
                try {
                    recognition.start();
                    speak('语音控制已开启');
                } catch (e) {
                    isListening = false;
                    voiceBtn.classList.remove('listening');
                }
            } else {
                voiceBtn.classList.remove('listening');
                recognition.stop();
                speak('语音控制已关闭');
            }
        }

        function handleVoiceCommand(command) {
            console.log('语音指令:', command);

            const classData = getCurrentClass();
            if (!classData) {
                speak('请先进入班级');
                return;
            }

            // 移除常见的语气词和助词
            let cleanCommand = command
                .replace(/给/g, '')
                .replace(/同学/g, '')
                .replace(/请/g, '')
                .replace(/好/g, '')
                .replace(/帮/g, '')
                .replace(/我/g, '')
                .replace(/来/g, '')
                .replace(/给/g, '')
                .replace(/那个/g, '')
                .replace(/一下/g, '')
                .replace(/一点/g, '')
                .replace(/个/g, '')
                .trim();

            console.log('清理后的指令:', cleanCommand);

            // 匹配加分指令
            if (cleanCommand.includes('加') || cleanCommand.includes('加积分') || cleanCommand.includes('加分')) {
                const match = cleanCommand.match(/(.+?)(加|加积分|加分)(\d+)/);
                if (match) {
                    const studentIdentifier = match[1].trim();
                    const score = parseInt(match[3]);
                    const student = findStudent(studentIdentifier, classData);

                    if (student) {
                        updateScore(student.id, score);
                        speak(`${student.name}加${score}分`);
                        selectStudent(student);
                    } else {
                        speak(`没找到${studentIdentifier}`);
                    }
                    return;
                }
            }

            // 匹配减分指令
            if (cleanCommand.includes('减') || cleanCommand.includes('扣') || cleanCommand.includes('减积分') || cleanCommand.includes('扣分')) {
                const match = cleanCommand.match(/(.+?)(减|扣|减积分|扣分)(\d+)/);
                if (match) {
                    const studentIdentifier = match[1].trim();
                    const score = parseInt(match[3]);
                    const student = findStudent(studentIdentifier, classData);

                    if (student) {
                        updateScore(student.id, -score);
                        speak(`${student.name}减${score}分`);
                        selectStudent(student);
                    } else {
                        speak(`没找到${studentIdentifier}`);
                    }
                    return;
                }
            }

            // 匹配点名指令
            if (cleanCommand.includes('点名') || cleanCommand.includes('开始点名')) {
                speak('开始点名');
                rollCall();
                return;
            }

            speak('没有识别到指令，请再说一次');
        }

        function findStudent(identifier, classData) {
            // 移除所有空格
            identifier = identifier.replace(/\s+/g, '');

            // 匹配学号+姓名（如1古雅萱、1张三）
            const numberNameMatch = classData.students.find(s => {
                const displayName = `${s.studentNumber}${s.name}`;
                return displayName === identifier;
            });

            if (numberNameMatch) return numberNameMatch;

            // 只匹配学号（如1、01）
            const numberMatch = classData.students.find(s => s.studentNumber === identifier);
            if (numberMatch) return numberMatch;

            // 只匹配姓名
            const nameMatch = classData.students.find(s => s.name === identifier);
            if (nameMatch) return nameMatch;

            // 模糊匹配姓名（包含关键词）
            const fuzzyMatch = classData.students.find(s => s.name.includes(identifier));
            if (fuzzyMatch) return fuzzyMatch;

            return null;
        }

        // ==================== 修改密码 ====================
        document.getElementById('changePasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (oldPassword !== appData.password) {
                alert('旧密码错误!');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('两次输入的新密码不一致!');
                return;
            }

            if (newPassword.length < 6) {
                alert('新密码长度不能少于6位!');
                return;
            }

            appData.password = newPassword;
            saveAppData();

            const modal = bootstrap.Modal.getInstance(document.getElementById('changePasswordModal'));
            modal.hide();
            document.getElementById('changePasswordForm').reset();
            alert('密码修改成功!');
        });

        // 管理班级模态框打开时渲染学生列表
        document.getElementById('manageClassModal').addEventListener('shown.bs.modal', function() {
            renderManageStudentList();
            renderGroupList();
            updateGroupSelect();
        });

        function updateGroupSelect() {
            const classData = getCurrentClass();
            if (!classData) return;

            const select = document.getElementById('addStudentGroup');
            select.innerHTML = (classData.groups || defaultGroups).map(group =>
                `<option value="${group.id}">${group.name} (${group.code})</option>`
            ).join('');
        }

        // ==================== 拖拽调整宽度 ====================
        let isResizing = false;
        let startX = 0;
        let startLeftWidth = 0;

        function initResizeHandle() {
            const resizeHandle = document.getElementById('resizeHandle');
            if (!resizeHandle) return;

            resizeHandle.addEventListener('mousedown', function(e) {
                isResizing = true;
                startX = e.clientX;
                const leftPanel = document.getElementById('leftPanel');
                startLeftWidth = leftPanel.offsetWidth;
                resizeHandle.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;

                const dx = e.clientX - startX;
                const mainContent = document.querySelector('.main-content');
                const containerWidth = mainContent.offsetWidth;
                const newLeftWidth = startLeftWidth + dx;
                const minWidth = 300;
                const maxWidth = containerWidth * 0.7;

                if (newLeftWidth >= minWidth && newLeftWidth <= maxWidth) {
                    const leftPanel = document.getElementById('leftPanel');
                    const rightPanel = document.getElementById('rightPanel');
                    const leftPercent = (newLeftWidth / containerWidth) * 100;
                    const rightPercent = 100 - leftPercent;

                    leftPanel.style.flex = `0 0 ${leftPercent}%`;
                    rightPanel.style.flex = `0 0 ${rightPercent}%`;
                }
            });

            document.addEventListener('mouseup', function() {
                if (isResizing) {
                    isResizing = false;
                    const resizeHandle = document.getElementById('resizeHandle');
                    resizeHandle.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });
        }

        // 初始化应用
        initApp();
        initResizeHandle();
    </script>
</body>
</html>
